name: errorgap
description: >-
  Flutter notifier for Errorgap error tracking — reports uncaught Flutter
  and Dart errors with backtraces and device context to your Errorgap project.
version: 0.1.0
homepage: https://github.com/errorgaphq/errorgap-flutter
repository: https://github.com/errorgaphq/errorgap-flutter
issue_tracker: https://github.com/errorgaphq/errorgap-flutter/issues

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  http: ^1.2.0

dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
